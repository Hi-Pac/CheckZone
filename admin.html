<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام تسجيل الحضور</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5D5CDE',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                        dark: '#181818',
                    },
                    fontFamily: { 'tajawal': ['Tajawal', 'sans-serif'] }
                }
            },
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary/90 via-indigo-600 to-purple-700 dark:from-dark dark:via-gray-900 dark:to-gray-800 flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl overflow-hidden">

            <!-- Card header -->
            <div class="bg-primary px-8 py-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 mb-4">
                    <i class="fas fa-shield-alt text-white text-3xl"></i>
                </div>
                <h1 class="text-white text-2xl font-bold">نظام تسجيل الحضور</h1>
                <p class="text-indigo-200 mt-1 text-sm">تسجيل الدخول كمدير النظام</p>
            </div>

            <!-- Card body -->
            <div class="px-8 py-8">
                <form id="loginForm" novalidate>

                    <!-- Username -->
                    <div class="mb-5">
                        <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-2" for="username">
                            <i class="fas fa-user text-primary ml-1"></i>
                            اسم المستخدم
                        </label>
                        <div class="relative">
                            <input
                                id="username"
                                type="text"
                                placeholder="اسم المستخدم"
                                autocomplete="username"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            >
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-6">
                        <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-2" for="password">
                            <i class="fas fa-lock text-primary ml-1"></i>
                            كلمة المرور
                        </label>
                        <div class="relative">
                            <input
                                id="password"
                                type="password"
                                placeholder="كلمة المرور"
                                autocomplete="current-password"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition pr-12"
                            >
                            <button
                                type="button"
                                id="togglePassword"
                                aria-label="إظهار أو إخفاء كلمة المرور"
                                class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-400 hover:text-primary dark:hover:text-primary transition"
                            >
                                <i id="toggleIcon" class="fas fa-eye text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"
                        id="submitBtn"
                        class="w-full bg-primary hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold py-3 px-6 rounded-xl transition focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                    >
                        <span id="btnText">دخول</span>
                        <i id="btnIcon" class="fas fa-arrow-left"></i>
                        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                    </button>

                </form>
            </div>

            <!-- Card footer -->
            <div class="px-8 pb-7 text-center">
                <a href="index.html" class="text-sm text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition">
                    <i class="fas fa-arrow-right ml-1"></i>
                    العودة إلى صفحة الحضور
                </a>
            </div>

        </div>
    </div>

    <script>
        // Dark mode
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }

        // Supabase
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SESSION_DURATION_MS = 8 * 60 * 60 * 1000; // 8 hours

        // Check existing session
        (function checkSession() {
            try {
                const raw = localStorage.getItem('adminSession');
                if (!raw) return;
                const session = JSON.parse(raw);
                if (session && session.authenticated && session.expiry > Date.now()) {
                    window.location.href = 'admin-dashboard.html';
                }
            } catch (_) {
                localStorage.removeItem('adminSession');
            }
        })();

        // Login function
        async function login(username, password) {
            const { data, error } = await supabase.from('settings').select('admin_username, admin_password').eq('id', 1).single();
            if (error || !data) throw new Error('تعذر الاتصال بقاعدة البيانات');
            if (data.admin_username === username && data.admin_password === password) {
                const session = { authenticated: true, username, expiry: Date.now() + SESSION_DURATION_MS };
                localStorage.setItem('adminSession', JSON.stringify(session));
                return true;
            }
            throw new Error('اسم المستخدم أو كلمة المرور غير صحيحة');
        }

        // Show/hide password toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Form submit
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                Swal.fire({
                    icon: 'warning',
                    title: 'تنبيه',
                    text: 'يرجى إدخال اسم المستخدم وكلمة المرور',
                    confirmButtonColor: '#5D5CDE',
                    confirmButtonText: 'حسناً',
                });
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnSpinner = document.getElementById('btnSpinner');

            btn.disabled = true;
            btnText.textContent = 'جارٍ التحقق...';
            btnIcon.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            try {
                await login(username, password);
                window.location.href = 'admin-dashboard.html';
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ في تسجيل الدخول',
                    text: err.message || 'حدث خطأ غير متوقع',
                    confirmButtonColor: '#5D5CDE',
                    confirmButtonText: 'حسناً',
                });
            } finally {
                btn.disabled = false;
                btnText.textContent = 'دخول';
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
